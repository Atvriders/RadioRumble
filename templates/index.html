<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Radio Rumble Contest Live Scoreboard</title>
<style>
  body {
    background: #fff;
    color: #512888;
    font-family: monospace;
    margin: 2em;
  }
  table {
    border-collapse: collapse;
    width: 400px;
  }
  th, td {
    border-bottom: 1px solid #512888;
    padding: 6px 12px;
    text-align: left;
  }
  th { color: #000; }
</style>
</head>
<body>
<h2>Radio Rumble Live Scoreboard</h2>
<table id="scoreboard">
  <thead><tr><th>Station</th><th>Contacts</th></tr></thead>
  <tbody></tbody>
</table>

<script>
const ws = new WebSocket("ws://" + location.host + "/ws");
ws.onmessage = function(event) {
  const data = JSON.parse(event.data);
  const tbody = document.querySelector("#scoreboard tbody");
  tbody.innerHTML = "";
  data.forEach(([station, count], idx) => {
    const row = document.createElement("tr");
    row.innerHTML = `<td>${idx+1}. ${station}</td><td>${count}</td>`;
    tbody.appendChild(row);
  });
};
</script>
</body>
</html>
